<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Banner</title>
  <style>
   /* NAVBAR CONTAINER */
.navbar {
    width: 100%;
    padding: 15px 40px;
    background: #f5f5f5;
    border-radius: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Poppins", sans-serif;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 35px;
    height: 35px;
}

.logo span {
    font-size: 20px;
    font-weight: 600;
}

/* NAV LINKS */
.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: #333;
    padding: 8px 18px;
    border-radius: 20px;
    transition: 0.3s ease;
    font-size: 16px;
}

/* HOVER EFFECT */
.nav-links a:hover {
    background: #e0e0e0;
}

/* ACTIVE PAGE */
.nav-links .active {
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
  </style>
